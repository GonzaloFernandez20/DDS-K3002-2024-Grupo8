<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio De Sesión</title>
    <link rel="stylesheet" href="sesion.css">
</head>

<body>
    <div class="container">
        <h2>Inicio De Sesión</h2>
        
        <form id="registrationForm">

            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingrese su usuario" required>
                <div class="error-message" id="usernameError"></div>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit">Iniciar Sesion</button>
            
        </form>
        
        <a href="RegistroPersona.html" title="Registrarse" class="hipervinculo"> ¿No tenes cuenta? Hace click para registrarte. </a>
    </div>

    <script src="InicioDeSesion.js"></script>

</body>

</html>
